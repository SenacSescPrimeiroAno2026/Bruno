<!DOCTYPE html>
<html lang="pt-br" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <title>Meu Perfil - Bruno</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="text-center">

    <div class="bg-primary text-white p-4">
        <h1>Meu perfil</h1>
        <button class="btn btn-outline-light btn-sm" onclick="document.documentElement.setAttribute('data-bs-theme', document.documentElement.getAttribute('data-bs-theme') === 'dark' ? 'light' : 'dark')">
            Trocar Cor
        </button>
    </div>

    <div class="container mt-5">
        <h2>Apresentação:</h2>
        <p><b>Me chamo Bruno Augusto Rodrigues. Tenho 15 anos e gosto de jogar e ver séries.</b></p>

        <h3 class="mt-5">Meu Jogo Preferido!</h3>
        
        <button class="btn btn-success btn-lg" onclick="document.getElementById('areaDoJogo').style.display='block'">
            Entrar no Jogo
        </button>

        <div id="areaDoJogo" class="mt-4 p-4 border rounded shadow-sm" style="display: none;">
            <h4 class="text-danger">🎮 GTA Online 🎮</h4>
            
            <img src="gta_online.png" class="img-fluid rounded mt-2" style="max-width: 500px;">
            
            <br>
            <button class="btn btn-info text-white mt-3" onclick="document.getElementById('areaEstatisticas').style.display='block'">
                Ver Estatísticas
            </button>

            <div id="areaEstatisticas" class="mt-3 p-3 bg-body-tertiary border rounded text-start" style="display: none;">
                <h5>Minhas Estatísticas:</h5>
                <ul>
                    <li><strong>Horas:</strong> +1.300 horas</li>
                    <li><strong>Nível:</strong> 521</li>
                    <li><strong>Dinheiro:</strong> 41MI</li>
                    <li> <STrong> Total de dinheiro arrecadado:</STrong> 451 MI</li>
                </ul>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
