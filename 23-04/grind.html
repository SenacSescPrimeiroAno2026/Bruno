<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grind</title>
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <h1> grinds</h1>
    <!--
    sistema de grind do bootstrap usa 6 classes para definir o numero de colunas em tamanhos de tela :
    
    .col - dispositovos expra  pequenos - largura de tela inferior a 576px
    .col-sm - discositivos pequenos - largura de tela superior a 576px
    .col-md - discositivos medianos - largura de tela superior a 768px
    .col-lg - dispositivo grandes- larura de tela superior a 992px
    .col-x1 - dispositivos extra grandes - largura de tela superior a 1200 px
    .col-xx1 - dispositivos extra grandes - largura de tela seperior a 1400px
    
    
    -->
    <div class="container-fluid mt-3">
    <div class="row">

        <div class="col-sm-1 p-3 bg-primary text-white"> col-sm</div>
        <div class="col-sm-1 p-3 bg-dark text-white"> col-sm</div>
        <div class="col-sm-1 p-3 bg-primary text-white"> col-sm</div>
        <div class="col-sm-1 p-3 bg-dark text-white"> col-sm</div>
</div>

<div class="row">

        <div class="col-md-1 p-3 bg-primary text-white"> col-sm</div>
        <div class="col-md-1 p-3 bg-dark text-white"> col-sm</div>
        <div class="col-md-1 p-3 bg-primary text-white"> col-sm</div>
        <div class="col-md-1 p-3 bg-dark text-white"> col-sm</div>


    </div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
